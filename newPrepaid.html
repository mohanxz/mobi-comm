<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/mainmin.css">
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light border">
        <div class="container-fluid ">
            <a class="navbar-brand fw-bold text-secondary fs-1"
                href="http://127.0.0.1:5500/homePage.html"><img src="src/images/mobi-comm-logo.png" alt="" style="width: 50px;"></a>
            <a class="navbar-brand fw-bold text-secondary fs-1"
                href="http://127.0.0.1:5500/homePage.html"><img src="src/images/mobi-comm-named-logo.png" alt="" style="width: 220px;"></a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll"
                aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarScroll">
                <ul class="navbar-nav me-auto my-2 my-lg-0 " style="--bs-scroll-height: 100px;">
                    <li class="nav-item">
                        <a class="nav-link active text-secondary text-decoration-underline"
                            aria-current="page">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " aria-current="page" href="http://127.0.0.1:5500/viewplans.html">View plans
                            </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="http://127.0.0.1:5500/AboutUsPage.html">About us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="http://127.0.0.1:5500/customerSupport.html">Support</a>
                    </li>

                </ul>
              
            </div>
        </div>
    </nav>

    <div class="container mt-5 p-4">

        <div class="row align-items-center">
            <div class="col-md-6">
                <h2 class="font-weight-bold">Get a new Mobi-Comm SIM</h2>
                <p>Just validate your number, share your address, and we'll deliver it to your doorstep for FREE.</p>
                <form id="otp-form">
                    <div class="form-group py-3">
                        <label for="name">Name</label>
                        <input type="text" class="form-control " id="name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group ">
                        <label for="mobile">Mobile Number</label>
                        <input type="tel" class="form-control mb-2" id="mobile" placeholder="Enter your mobile number"
                            required>
                        <small>You will receive an OTP on your number.</small>
                        <span id="otp-message" class="text-done" style="display: none;">OTP sent successfully</span>
                    </div>
                    <button type="button" class="btn btn-primary btn-block mt-2" onclick="sendOTP()">Generate
                        OTP</button>
                </form>
                <div id="otp-section" style="display: none;" class="mt-3">
                    <div class="form-group">
                        <label for="otp">Enter OTP</label>
                        <input type="text" class="form-control" id="otp" placeholder="Enter received OTP" required>
                    </div>
                    <button type="button" class="btn btn-done btn-block mt-3 bg-primary text-light"
                        onclick="verifyOTP()">Verify OTP</button>
                </div>
                <div id="details-section" style="display: none;" class="mt-3">
                    <div class="form-group">
                        <label for="aadhar">Aadhaar Number</label>
                        <input type="text" class="form-control" id="aadhar" placeholder="Enter your Aadhaar number"
                            required maxlength="12" minlength="12">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea class="form-control" id="address" placeholder="Enter your address"
                            required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="state">State</label>
                        <select class="form-control" id="state" required onchange="populateDistricts()">
                            <option value="">Select State</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="district">District</label>
                        <select class="form-control" id="district" required>
                            <option value="">Select District</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pincode">Pincode</label>
                        <textarea class="form-control" id="address" placeholder="eg.636 010"
                            required></textarea>
                    </div>
                    <button type="submit" onclick="submitForm()" class="btn btn-primary btn-block mt-3">Submit</button>
                </div>
            </div>
            <div class="col-md-6 text-center">
                <img src="https://yourdomain.com/illustration.png" alt="Mobi-Comm Benefits" class="img-fluid">
                <p class="mt-3 font-weight-bold">You get instant access to Mobi-Comm services and offers!</p>
            </div>
        </div>
    </div>

    <script>
        const statesAndDistricts = {
            "Tamil Nadu": ["Chennai", "Coimbatore", "Madurai", "Salem", "Tiruchirappalli"],
            "Maharashtra": ["Mumbai", "Pune", "Nagpur", "Nashik", "Thane"],
            "Karnataka": ["Bangalore", "Mysore", "Mangalore", "Hubli", "Belgaum"],
            "Delhi": ["Central Delhi", "North Delhi", "South Delhi", "West Delhi", "East Delhi"],
            "Uttar Pradesh": ["Lucknow", "Kanpur", "Agra", "Varanasi", "Meerut"],
            "West Bengal": ["Kolkata", "Howrah", "Durgapur", "Siliguri", "Asansol"],
            "Rajasthan": ["Jaipur", "Jodhpur", "Udaipur", "Ajmer", "Bikaner"]
        };

        window.onload = function () {
            let stateSelect = document.getElementById("state");
            for (let state in statesAndDistricts) {
                let option = document.createElement("option");
                option.value = state;
                option.textContent = state;
                stateSelect.appendChild(option);
            }
        };

        function sendOTP() {
            let mobile = document.getElementById("mobile").value;
            if (/^\d{10}$/.test(mobile)) {
                document.getElementById("otp-message").style.display = "block";
                document.getElementById("otp-section").style.display = "block";
            } else {
                alert("Please enter a valid 10-digit mobile number");
            }
        }

        function verifyOTP() {
            let otp = document.getElementById("otp").value;
            if (/^\d{6}$/.test(otp)) {
                document.getElementById("details-section").style.display = "block";
            } else {
                alert("Invalid OTP, please enter a 6-digit OTP.");
            }
        }

        function populateDistricts() {
            let state = document.getElementById("state").value;
            let districtSelect = document.getElementById("district");
            districtSelect.innerHTML = "<option value=''>Select District</option>";
            if (statesAndDistricts[state]) {
                statesAndDistricts[state].forEach(district => {
                    let option = document.createElement("option");
                    option.value = district;
                    option.textContent = district;
                    districtSelect.appendChild(option);
                });
            }
        }
        function submitForm() {
            let trackingId = Math.floor(100000 + Math.random() * 900000);
            document.getElementById("details-section").innerHTML = `
        <div class='text-center text-primary mt-3'>
            <img src="src/images/smilySimCard.png" class="img-fluid d-inline-block" alt="" style="width: 130px;">
            <div class="d-inline">
                <h4> Your SIM will reach your door in 2 days!</h4>
                <p>Your tracking ID is: <strong>${trackingId}</strong></p>

                </div>
        </div>
    `;
        }
    </script>



</body>

</html>
